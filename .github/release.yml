changelog:
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 🛡 Security
      labels:
        - security
    - title: 📝 Documentation
      labels:
        - documentation
        - docs
    - title: 🧰 Maintenance
      labels:
        - chore
        - dependencies
exclude:
  labels:
    - skip-release-notes
template: |
  ## What's changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS